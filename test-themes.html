<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Test</title>
    <link rel="stylesheet" href="colorMood.css">
    <link rel="stylesheet" href="chatbot.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            transition: all 0.5s ease;
        }
        .test-container {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .test-btn {
            padding: 15px 10px;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            transition: transform 0.2s;
        }
        .test-btn:hover {
            transform: scale(1.05);
        }
        .test-btn:active {
            transform: scale(0.95);
        }
        #current-theme {
            font-size: 24px;
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body data-theme="rainbow-dream">
    <div class="test-container">
        <h1>🎨 Theme Testing Page</h1>
        <div id="current-theme">Current Theme: rainbow-dream</div>
        
        <div class="theme-grid">
            <button class="test-btn" onclick="testTheme('deep-blue-ocean')">Deep Blue Ocean</button>
            <button class="test-btn" onclick="testTheme('royal-sapphire')">Royal Sapphire</button>
            <button class="test-btn" onclick="testTheme('emerald-dream')">Emerald Dream</button>
            <button class="test-btn" onclick="testTheme('golden-sparkle')">Golden Sparkle</button>
            <button class="test-btn" onclick="testTheme('midnight-luxury')">Midnight Luxury</button>
            <button class="test-btn" onclick="testTheme('coral-charm')">Coral Charm</button>
            <button class="test-btn" onclick="testTheme('ice-crystal')">Ice Crystal</button>
            <button class="test-btn" onclick="testTheme('ruby-flame')">Ruby Flame</button>
            <button class="test-btn" onclick="testTheme('sky-bubble')">Sky Bubble</button>
            <button class="test-btn" onclick="testTheme('neon-party')">Neon Party</button>
            <button class="test-btn" onclick="testTheme('peacock-shine')">Peacock Shine</button>
            <button class="test-btn" onclick="testTheme('chocolate-deluxe')">Chocolate Deluxe</button>
            <button class="test-btn" onclick="testTheme('aqua-paradise')">Aqua Paradise</button>
            <button class="test-btn" onclick="testTheme('blush-princess')">Blush Princess</button>
            <button class="test-btn" onclick="testTheme('storm-grey-pro')">Storm Grey Pro</button>
            <button class="test-btn" onclick="testTheme('ocean-neon')">Ocean Neon</button>
            <button class="test-btn" onclick="testTheme('magic-gold-black')">Magic Gold & Black</button>
            <button class="test-btn" onclick="testTheme('frozen-blue')">Frozen Blue</button>
            <button class="test-btn" onclick="testTheme('cosmic-purple')">Cosmic Purple</button>
            <button class="test-btn" onclick="testTheme('sunshine-pop')">Sunshine Pop</button>
        </div>
    </div>

    <script>
        function testTheme(themeName) {
            console.log('Testing theme:', themeName);
            document.body.setAttribute('data-theme', themeName);
            void document.body.offsetHeight;
            document.getElementById('current-theme').textContent = 'Current Theme: ' + themeName;
            
            // Check if CSS variable is working
            const style = getComputedStyle(document.body);
            const bgGradient = style.getPropertyValue('--background-gradient');
            console.log('Background gradient:', bgGradient);
            
            if (!bgGradient) {
                alert('ERROR: CSS variable not found for ' + themeName);
            }
        }
        
        // Test on load
        console.log('Test page loaded');
        console.log('Initial theme:', document.body.getAttribute('data-theme'));
    </script>

    <!-- KidBattle Chatbot -->
    <div id="kidbattle-chatbot">
        <button id="chatbot-toggle-btn" class="chatbot-toggle-btn" aria-label="Open KidBattle Chatbot">
            <svg class="chat-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H5.17L4 17.17V4H20V16Z" fill="currentColor"/>
                <circle cx="8" cy="10" r="1.5" fill="currentColor"/>
                <circle cx="12" cy="10" r="1.5" fill="currentColor"/>
                <circle cx="16" cy="10" r="1.5" fill="currentColor"/>
            </svg>
            <svg class="close-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z" fill="currentColor"/>
            </svg>
        </button>
        <div id="chatbot-window" class="chatbot-window">
            <div class="chatbot-header">
                <div class="chatbot-header-content">
                    <div class="chatbot-avatar">🤖</div>
                    <div class="chatbot-title-area">
                        <h3 class="chatbot-title">KidBattle Chatbot</h3>
                        <p class="chatbot-subtitle">Ask me anything! I'm here to help kids learn and play. 🎮</p>
                    </div>
                </div>
                <button id="chatbot-close-btn" class="chatbot-close-btn" aria-label="Close chatbot">✕</button>
            </div>
            <div id="chatbot-messages" class="chatbot-messages">
                <div class="chatbot-message bot-message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-bubble">
                        <p>Hello! I'm KidBattle Chatbot 🤖</p>
                        <p>How can I help you today?</p>
                        <div class="quick-suggestions">
                            <button class="suggestion-btn" data-message="Hello">👋 Say Hello</button>
                            <button class="suggestion-btn" data-message="Help">❓ Help</button>
                            <button class="suggestion-btn" data-message="Alphabet">🔤 Alphabet</button>
                            <button class="suggestion-btn" data-message="Numbers">🔢 Numbers</button>
                            <button class="suggestion-btn" data-message="Games">🎮 Games</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="chatbot-input-area">
                <input type="text" id="chatbot-input" class="chatbot-input" placeholder="Type your message here..." autocomplete="off" maxlength="200"/>
                <button id="chatbot-send-btn" class="chatbot-send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="chatbot.js"></script>
</body>
</html>
